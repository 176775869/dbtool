<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<!-- 移动端适配 -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="js/css/mobile.css" />

    <title>交易复盘工具</title>
    <script src="js/lib/jquery/3.2.1/jquery.js"></script> 
    <script src="js/lib/xlsx/0.11.5/xlsx.core.min.js"></script>
    
    <script type="text/javascript" src="js/base/tip.js"></script>
    <script type="text/javascript" src="js/base/storage.js"></script>
    <script type="text/javascript" src="js/base/indexdb.js"></script>
    <script type="text/javascript" src="js/base/timer.js"></script>

    <link rel="stylesheet" type="text/css" href="js/doubao/strategy.css" />
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
    </div>
    <div>
        <input type="file" id="excel-file" multiple="multiple">
        <select id="showdays" style="width: 50px;">
            <option value="30" >30</option>
            <option value="60" selected>60</option>
            <option value="120">120</option>
            <option value="180">180</option>
            <option value="250">250</option>
        </select>
        <select id="indecator" style="width: 100px;">
            <option value="0">--请选择--</option>
        </select>
        <input id="pre" type="button" value='<' style="width: 20px;"/>
        <input id="date" type="date" min="2022-07-04">
        <input id="next" type="button" value='>' style="width: 20px;"/>
        <input id="last" type="button" value='>>' style="width: 26px;"/>
        <select id="mode" style="width: 50px;">
            <option value="0" selected>复盘</option>
            <option value="1">盯盘</option>
        </select>
        <select id="rtShowdays" style="width: 50px;">
            <option value="1" selected>rt-1</option>
            <option value="2">rt-2</option>
            <option value="4">rt-4</option>
        </select>
        <div id='speecker'></div>
    </div>
    <canvas id="drawing" width="1400" height="400">
        Your browser does not support the HTML5 canvas tag.</canvas>

    <div id="AI"></div>
    <form id="form1">
        类型：<input type="radio" checked="checked" name="gtype" />游资
        <input type="radio" name="gtype" />庄游
        <input type="radio" name="gtype" />排名<br/>
        排序：<input type="radio" name="sort" />得分
        <input type="radio" name="sort" checked="checked"/>高度<input type="radio" name="sort"/>涨速<br/>
    </form>
    <form id="form3">
        板块：<input type="checkbox" name="sector"/>主板
        <input type="checkbox" name="sector" />科/创板
        <input type="checkbox" name="sector" />北交所
    </form>
    <form id="form2"></form>
    
    <table id='tbl'>
        <thead></thead>
        <tbody></tbody>
    </table>
    <a id="load-all-btn" hidden href="javascript:;"> >>></a>
    <footer> 
        <a id="cailianshe" href="https://www.cls.cn/telegraph" target='_blank'>盘中电报 </a>&nbsp; 
        <a id="jiuyan" href="https://www.jiuyangongshe.com/action/" target='_blank'>韭研复盘 </a>&nbsp;
        <a href="https://github.com/gaoguang-2026/Atool" target='_blank'>豆包模式 </a>&nbsp; 
        <a id="taogu" href="https://chat.deepseek.com/a/chat/s/aa2d649d-ff89-4461-9ac8-ffe612993f49" target='_blank'>DS策略 </a>&nbsp; 
    </footer> 
    
    <script src="js/config.js"></script>
    <script src="js/rt/rtRankData.js"></script>
    <script src="js/rt/rtDataStore.js"></script>
    <script src="js/rt/rtDataManager.js"></script>
    <script src="js/speecher.js"></script>
    <script src="js/workbook.js"></script>
    <script src="js/requests.js"></script>
    <script src="js/dragons.js"></script>
    <script src="js/rt/parserRT.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/rt/canvasRT.js"></script>
    <script src="js/echelon.js"></script>
    <script src="js/bandEchelon.js"></script>
    <script src="js/table.js"></script>
    <script src="js/download.js"></script>
    <script src="js/rt/rtSpirit.js"></script>
    <script src="js/AI.js"></script>
    <script src="js/mobile.js"></script>
    <script src="js/doubao/strategy.js"></script>
	<script src="js/event_manager.js"></script>
    <script src="js/startup.js"></script>
